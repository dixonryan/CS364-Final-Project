<!DOCTYPE html>

<head>
<script src="script.js"></script>
</head>

<html lang="en">
    <head>
        <title>Add New User</title>
        <link rel="stylesheet" href="addProbate.css">
    </head>


<body>
    <header class="header">
        <name>Add New Probate Page</name>
        <a href="main.html" class = addMember>Home Page</a>
    </header>

    <div class="inputForm">
        <form><!--Add action param in form field-->
            <label for="ProbateID" class = "inputs">ProbateID:</label>
            <input type="text" id="ProbateID" name="ProbateID" placeholder="########" class = "inputs">

            <label for="probate" class = "inputs">Probate Name:</label>
            <input type="text" id="probate" name="probate" placeholder="First and Last" class = "inputs">
            
            <label for="start" class = "inputs">Start Date:</label>
            <input type="text" id="start" name="start" placeholder="01/30/26" class = "inputs">
            
            <label for="end" class = "inputs">End Date:</label>
            <input type="text" id="end" name="end" placeholder="07/30/26" class = "inputs">
            
            <label for="squad" class = "inputs">Squadron:</label>
            <input type="text" id="squad" name="squad" placeholder="CS-31" class = "inputs">

            <label for="year" class = "inputs">Class Year:</label>
            <input type="text" id="year" name="year" placeholder="2027" class = "inputs">

            <input type="submit" value="Submit" class = "submitButton">
        </form>
    </div>
    
    </body>
</body>
</html>
