<!DOCTYPE html>
<html lang="en">

<head>
    <title>USAFA Honor Probation Tracker</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="header">
        <p class="name">USAFA Honor Probation Tracker Login</p>
    </div>
    <form id = "createAccountForm" class="Create Account"><!--Add action param in form field-->
        <label class="label" for="username">New User:</label>
        <br>
        <input class="inputBox" type="text" id="username" name="username" placeholder="First and Last Name">
        <br>
        <label class="label" for="password">New Password:</label>
        <br>
        <input class="inputBox" type="text" id="password" name="password" placeholder="Password">
        <br>
        <label class="label" for="password">Confirm Password:</label>
        <br>
        <input class="inputBox" type="text" id="confirmPassword" name="confirmPassword" placeholder="Password">
        <br>
        <button type="submit" class="CreateButton">Create</button>
    </form>


    
    <script>
        document.getElementById("createAccountForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        const res = await fetch("/users", {
            method: "POST",
            headers: {
            "Content-Type": "application/json"
            },
            body: JSON.stringify({
            username,
            password
            })
        });

        const data = await res.json();
        console.log("Server response:", data);

        window.location.href = "main.html";
        });
</script>


</body>
</html>
