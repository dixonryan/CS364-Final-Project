<!DOCTYPE html>
<html lang="en">

<head>
    <title>USAFA Honor Probation Tracker</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="header">
        <p class="name">USAFA Honor Probation Tracker Login</p>
    </div>
    <form id="form" class="login"><!--Add action param in form field-->
        <label class="label" for="username">User:</label>
        <br>
        <input class="inputBox" type="text" id="username" name="username" placeholder="Username">
        <br>
        <label class="label" for="password">Password:</label>
        <br>
        <input class="inputBox" type="text" id="password" name="password" placeholder="Password">
        <br>
        <br>
        <input type="submit" value="Submit" class = "loginButton">
    </form>
<a href="createAcc.html" class = createAccButton>Create Account</a>

</body>
</html>
